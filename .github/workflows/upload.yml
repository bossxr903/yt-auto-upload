name: Daily YouTube Upload

on:
  schedule:
    # Runs at 8:00 AM and 7:00 PM Bangladesh Time (UTC+6)
    # 02:00 UTC = 8:00 AM BD, 13:00 UTC = 7:00 PM BD
    - cron: '0 2,13 * * *'
  workflow_dispatch:   # Allow manual trigger

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create credential files from secrets
        run: |
          cat << 'EOF' > client_secret.json
          ${{ secrets.CLIENT_SECRET_JSON }}
          EOF
          cat << 'EOF' > token.json
          ${{ secrets.TOKEN_JSON }}
          EOF

      - name: Create .env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "SOURCE_FOLDER_ID=${{ secrets.SOURCE_FOLDER_ID }}" >> .env
          echo "UPLOADED_FOLDER_ID=${{ secrets.UPLOADED_FOLDER_ID }}" >> .env
          echo "YOUTUBE_SCHEDULE_TIMES=${{ secrets.YOUTUBE_SCHEDULE_TIMES }}" >> .env

      - name: Run upload script
        run: python upload.py
