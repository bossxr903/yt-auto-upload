name: Daily YouTube Upload

on:
  schedule:
    # Runs every day at 8:00 UTC (adjust as needed)
    - cron: '0 8 * * *'
  workflow_dispatch:   # Allow manual trigger

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create credential files from secrets
        env:
          CLIENT_SECRET_JSON: ${{ secrets.CLIENT_SECRET_JSON }}
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
        run: |
          printf '%s' "$CLIENT_SECRET_JSON" > client_secret.json
          printf '%s' "$TOKEN_JSON" > token.json

      - name: Create .env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "SOURCE_FOLDER_ID=${{ secrets.SOURCE_FOLDER_ID }}" >> .env
          echo "UPLOADED_FOLDER_ID=${{ secrets.UPLOADED_FOLDER_ID }}" >> .env
          echo "YOUTUBE_SCHEDULE_TIMES=${{ secrets.YOUTUBE_SCHEDULE_TIMES }}" >> .env

      - name: Run upload script
        run: python upload.py
